<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResPress</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=VT323&family=Tinos:wght@400;700&family=Anton&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="introScreen" class="intro-screen" aria-hidden="false">
    <button id="introLangBtn" class="intro-lang-btn" type="button">IS</button>

    <div class="intro-inner">
      <div class="intro-frame">
        <canvas id="introCanvas" class="intro-canvas" aria-hidden="true"></canvas>
      </div>

      <div class="intro-text-block">
        <p class="intro-credit" id="introCredit">ResPress by Stefán Daði Karelsson</p>
      </div>

      <button id="startBtn" class="start-btn" type="button">Start</button>
    </div>
  </div>

  <div id="projectPopup" class="project-popup" hidden>
    <div class="project-popup-card">
      <div class="project-popup-topbar">
        <button id="projectPopupLangBtn" class="project-popup-lang-btn" type="button">IS</button>
        <button id="projectPopupClose" class="project-popup-close" type="button">×</button>
      </div>

      <div class="project-popup-copy">
        <p id="projectPopupText" class="project-popup-text"></p>
      </div>

      <div class="project-popup-actions">
        <button id="projectPopupContinue" class="project-popup-btn" type="button">Continue</button>
      </div>
    </div>
  </div>

  <div id="helpPanel" class="help-panel" hidden>
    <div class="help-panel-inner">
      <div class="help-title">Shortcuts</div>
      <div class="help-row"><span>Shift + G</span><span>Grid</span></div>
      <div class="help-row"><span>Shift + H</span><span>Hinting</span></div>
      <div class="help-row"><span>Shift + C</span><span>Contrast</span></div>
      <div class="help-row"><span>Shift + O</span><span>Pixel Shape</span></div>
      <div class="help-row"><span>Shift + I</span><span>Info Panel</span></div>
      <div class="help-row"><span>Shift + L</span><span>Language</span></div>
      <div class="help-row"><span>Shift + P</span><span>Presentation</span></div>
      <div class="help-row"><span>Shift + R</span><span>Reset</span></div>
    </div>
  </div>

  <div id="exportModal" class="export-modal" hidden>
    <div class="export-modal-card">
      <div class="export-modal-title" id="exportModalTitle">Name export</div>
      <input
        id="exportNameInput"
        class="export-name-input"
        type="text"
        maxlength="80"
        autocomplete="off"
        spellcheck="false"
      />
      <input
        id="exportEmailInput"
        class="export-name-input export-email-input"
        type="email"
        maxlength="120"
        autocomplete="email"
        spellcheck="false"
        hidden
      />
      <div class="export-modal-actions">
        <button id="exportCancelBtn" type="button">Cancel</button>
        <button id="exportConfirmBtn" type="button">Save</button>
      </div>
    </div>
  </div>

  <main id="app" class="app app-hidden">
    <header class="topbar">
      <div class="top-left">
        <span id="projectTag">ResPress</span>
      </div>

      <div class="top-right">
        <div class="font-menu-wrap">
          <button
            id="fontMenuBtn"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
          >
            IBM Plex Mono
          </button>

          <div id="fontMenu" class="dropdown-menu dropdown-fonts" hidden>
            <button class="dropdown-menu-item font-option is-active" type="button" data-font="plex">IBM Plex Mono</button>
            <button class="dropdown-menu-item font-option" type="button" data-font="vt323">VT323</button>
            <button class="dropdown-menu-item font-option" type="button" data-font="times">Tinos</button>
            <button class="dropdown-menu-item font-option" type="button" data-font="impact">Anton</button>

            <div class="dropdown-separator" aria-hidden="true"></div>

            <button id="uploadFontBtn" class="dropdown-menu-item" type="button">Upload Font</button>
            <button id="customFontBtn" class="dropdown-menu-item font-option custom-font-option" type="button" data-font="custom" hidden>
              Custom Font
            </button>
          </div>

          <input
            id="fontUploadInput"
            type="file"
            accept=".otf,.ttf,.woff,.woff2,font/otf,font/ttf,font/woff,font/woff2"
            hidden
          />
        </div>

        <div class="tools-menu-wrap">
          <button
            id="toolsMenuBtn"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
          >
            Tools
          </button>

          <div id="toolsMenu" class="dropdown-menu dropdown-tools" hidden>
            <button id="hintBtn" class="dropdown-menu-item toggle-item" type="button">Hinting: Off</button>
            <button id="contrastBtn" class="dropdown-menu-item toggle-item" type="button">White on Black</button>
            <button id="gridBtn" class="dropdown-menu-item toggle-item" type="button">Grid: Off</button>
            <button id="shapeBtn" class="dropdown-menu-item toggle-item" type="button">Shape: Square</button>
            <button id="infoBtn" class="dropdown-menu-item toggle-item" type="button">Info Panel: On</button>
            <button id="presentationBtn" class="dropdown-menu-item toggle-item" type="button">Presentation: Off</button>
            <button id="resetBtn" class="dropdown-menu-item toggle-item" type="button">Reset</button>
          </div>
        </div>

        <div class="download-menu-wrap">
          <button
            id="downloadMenuBtn"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
          >
            Download
          </button>

          <div id="downloadMenu" class="dropdown-menu dropdown-download" hidden>
            <button id="downloadPngBtn" class="dropdown-menu-item" type="button">Download PNG</button>
            <button id="downloadFontBtn" class="dropdown-menu-item" type="button">Get Custom Font</button>
            <button id="emailFontBtn" class="dropdown-menu-item" type="button">Email Custom Font</button>
          </div>
        </div>

        <button id="helpBtn" type="button">?</button>
        <button id="langBtn" type="button">IS</button>
      </div>
    </header>

    <section class="controls">
      <div class="input-wrap">
        <textarea
          id="textInput"
          maxlength="500"
          placeholder="Type here"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
        >letters are what is legible. If something is not legible, then it is not letters. There are no illegible letters. Illegibility does not exist.</textarea>

        <div class="meta-row">
          <span id="inputCount">0</span>
        </div>
      </div>

      <div class="slider-wrap">
        <div class="slider-block">
          <div class="slider-labels">
            <span id="sliderMin">Unreadable</span>
            <span id="sliderLabel">Unstable → Stable</span>
            <span id="sliderMax">Clear</span>
          </div>

          <div class="slider-shell">
            <input
              type="range"
              id="resSlider"
              min="0"
              max="100"
              value="40"
            />
          </div>

          <div class="slider-value slider-single-value">
            <span id="resValue">40</span>
          </div>
        </div>

        <div class="slider-block">
          <div class="slider-labels">
            <span id="scaleMin">Small</span>
            <span id="scaleLabel">Scale</span>
            <span id="scaleMax">Large</span>
          </div>

          <div class="slider-shell">
            <input
              type="range"
              id="scaleSlider"
              min="60"
              max="200"
              value="100"
            />
          </div>

          <div class="slider-value">
            <span id="scaleValue">100%</span>
          </div>
        </div>
      </div>
    </section>

    <section id="stage" class="stage">
      <div class="stage-shell">
        <div id="stageScroller" class="stage-scroller">
          <canvas id="displayCanvas"></canvas>
        </div>
      </div>
    </section>

    <canvas id="sourceCanvas" hidden></canvas>
    <canvas id="bufferCanvas" hidden></canvas>
    <canvas id="compositionCanvas" hidden></canvas>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/opentype.js/dist/opentype.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
